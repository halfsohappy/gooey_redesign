<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ title }} — Gooey</title>
  <link rel="icon" type="image/svg+xml" href="{{ url_for('static', filename='favicon.svg') }}">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body class="docs-page">

  <!-- ===== Docs Header ===== -->
  <header class="main-header">
    <div class="hdr-row">

      <!-- Identity -->
      <div class="hdr-box hdr-logo-box">
        <div class="hdr-logo-text">Gooey</div>
        <div class="hdr-logo-sub">annieData<br>Control Center</div>
      </div>

      <!-- Back + switch guide -->
      <div class="hdr-box hdr-box-seamless">
        <a class="hdr-seamless-btn" href="/">← Back to App</a>
        <a class="hdr-seamless-btn" href="{{ url_for('docs', guide=other_guide) }}">📖 {{ other_title }}</a>
      </div>

      <!-- Current guide title -->
      <div class="hdr-box docs-hdr-title">
        <span class="docs-hdr-label">📚 {{ title }}</span>
      </div>

    </div>
  </header>

  <!-- ===== Docs Layout ===== -->
  <div class="docs-layout">

    <!-- Sidebar TOC -->
    <nav class="docs-toc" id="docsToc">
      <div class="docs-toc-heading">Contents</div>
      {{ toc | safe }}
    </nav>

    <!-- Main content -->
    <main class="docs-content" id="docsContent">
      <article class="docs-article">
        {{ content | safe }}
      </article>
    </main>

  </div>

  <script>
  (function () {
    "use strict";

    /* Highlight the active TOC link as the user scrolls */
    var headings = Array.from(document.querySelectorAll(".docs-article h1, .docs-article h2, .docs-article h3"));
    var tocLinks = Array.from(document.querySelectorAll(".docs-toc a"));

    if (!headings.length || !tocLinks.length) { return; }

    function setActive(id) {
      tocLinks.forEach(function (a) {
        a.classList.toggle("toc-active", a.getAttribute("href") === "#" + id);
      });
    }

    var scroller = document.getElementById("docsContent");
    scroller.addEventListener("scroll", function () {
      var scrollTop = scroller.scrollTop;
      var active = headings[0];
      headings.forEach(function (h) {
        if (h.offsetTop - 80 <= scrollTop) { active = h; }
      });
      if (active) { setActive(active.id); }
    }, { passive: true });

    /* Smooth-scroll TOC links within the content panel */
    tocLinks.forEach(function (a) {
      a.addEventListener("click", function (e) {
        var target = document.querySelector(a.getAttribute("href"));
        if (target) {
          e.preventDefault();
          scroller.scrollTo({ top: target.offsetTop - 24, behavior: "smooth" });
        }
      });
    });

  })();
  </script>

</body>
</html>
