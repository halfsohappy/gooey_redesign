<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>annieData Control Center</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playwrite+DE+Grund&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      height: 100%;
      background: #0d0d0d;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Playwrite DE Grund', cursive;
    }
    .wrap {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 20px;
      color: #e0e0e0;
      user-select: none;
    }
    .logo {
      font-size: 2.2rem;
      font-weight: 700;
      letter-spacing: 0.08em;
      color: #DAC7FF;
    }
    .sub {
      font-size: 0.75rem;
      opacity: 0.45;
      letter-spacing: 0.15em;
      text-transform: uppercase;
    }
    .spinner {
      width: 32px;
      height: 32px;
      border: 2.5px solid rgba(218, 199, 255, 0.2);
      border-top-color: #DAC7FF;
      border-radius: 50%;
      animation: spin 0.75s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="logo">annieData Control Center</div>
    <div class="spinner"></div>
    <div class="sub">Starting…</div>
  </div>
</body>
</html>
