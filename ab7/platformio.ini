; PlatformIO Project Configuration — ab7 board
;
; ab7 PCB: ESP32-S3 + LSM9DS1 (I2C), SK6812 LED, two buttons.
; No barometer — baro data stream returns zero.

[platformio]
default_envs = esp32-s3-devkitc-1-lsm9ds1

[env:esp32-s3-devkitc-1-lsm9ds1]
platform = espressif32
board = esp32-s3-devkitc-1
framework = arduino
monitor_speed = 115200
upload_protocol = esptool
build_flags = 
	-D ARDUINO_USB_MODE=1
	-D ARDUINO_USB_CDC_ON_BOOT=1    

lib_deps =
	FastLED
	MicroOSC=https://github.com/thomasfredericks/MicroOsc
	WiFiProvisioner.git=https://github.com/halfsohappy/WiFiProvisioner.git#56688e85fb1ac4b7695265e6b4a784cf60f26dba
	adafruit/Adafruit LSM9DS1 Library@^2.1.2
	adafruit/Adafruit AHRS@^2.4.0

[env:esp32-s3-devkitc-1-bno085]
platform = espressif32
board = esp32-s3-devkitc-1
framework = arduino
monitor_speed = 115200
upload_protocol = esptool
build_flags = 
	-D ARDUINO_USB_MODE=1
	-D ARDUINO_USB_CDC_ON_BOOT=1    
	-DAB7_IMU_BNO085
lib_deps =
	FastLED
	MicroOSC=https://github.com/thomasfredericks/MicroOsc
	WiFiProvisioner.git=https://github.com/halfsohappy/WiFiProvisioner.git#56688e85fb1ac4b7695265e6b4a784cf60f26dba
	adafruit/Adafruit BNO08x@^1.2.5
