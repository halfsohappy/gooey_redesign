; PlatformIO Project Configuration — ab7 board
;
; ab7 PCB: ESP32-S3 + BNO-085 (SPI), SK6812 LED, two buttons.
; No barometer — baro data stream returns zero.

[env:esp32-s3-devkitc-1]
platform = espressif32
board = esp32-s3-devkitc-1
framework = arduino
monitor_speed = 115200
upload_protocol = esptool
build_flags = 
	-D ARDUINO_USB_MODE=1
	-D ARDUINO_USB_CDC_ON_BOOT=1    

lib_deps =
	FastLED
	MicroOSC=https://github.com/thomasfredericks/MicroOsc
	WiFiProvisioner.git=https://github.com/halfsohappy/WiFiProvisioner.git#56688e85fb1ac4b7695265e6b4a784cf60f26dba
	adafruit/Adafruit BNO08x@^1.2.5
