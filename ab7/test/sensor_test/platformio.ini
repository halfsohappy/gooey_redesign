; PlatformIO Sensor Test — ab7 board BNO-085 diagnostic
;
; Flash this project to the ab7 board and open the serial monitor at 115200
; baud to see diagnostic output for each stage of the sensor data pipeline.
;
; This project tests:
;   1. SPI bus initialisation
;   2. BNO-085 initialisation and report enabling
;   3. Sensor event reception (rotation vector, linear accel, gyro)
;   4. Data stream normalisation and population
;   5. Simulated value_ptr read (as the send task would do)
;
; If all tests pass but the main firmware still shows zero values, the issue
; is in the OSC message/patch configuration or network layer.

[env:esp32-s3-devkitc-1]
platform = espressif32
board = esp32-s3-devkitc-1
framework = arduino
monitor_speed = 115200
upload_protocol = esptool
build_flags = 
	-D ARDUINO_USB_MODE=1
	-D ARDUINO_USB_CDC_ON_BOOT=1    

lib_deps =
	adafruit/Adafruit BNO08x@^1.2.5
