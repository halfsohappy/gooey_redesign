; PlatformIO Project Configuration — TheaterGWD Setup Remote
;
; Hardware:
;   - Waveshare ESP32-S3-LCD-1.3 (ESP32-S3R8, ST7789VW 240×240 IPS)
;   - Adafruit Mini I2C Gamepad QT  (I2C 0x50, SDA=IO1, SCL=IO2)
;
; Build:
;   cd remote
;   pio run                  # compile
;   pio run -t upload        # compile and flash
;   pio device monitor       # serial monitor (115200)
;
; This handheld remote sends OSC commands to TheaterGWD devices over WiFi,
; allowing you to create/edit messages and patches, manage oris, start/stop
; sending, and monitor device status — all without a computer.
;
; WiFi credentials are configured on first boot via a captive-portal
; provisioning page (WiFiProvisioner library).

[env:remote]
platform = espressif32
board = esp32-s3-devkitc-1
framework = arduino
monitor_speed = 115200
upload_protocol = esptool
upload_port = /dev/cu.usbmodem595B0605571
extra_scripts = scripts/fix_upload.py

build_flags =
    -D ARDUINO_USB_MODE=1
    -D ARDUINO_USB_CDC_ON_BOOT=1
    ; ── TFT_eSPI ST7789VW display config (Waveshare ESP32-S3-LCD-1.3) ──
    ; Pins from official Waveshare demo code (Arduino_ESP32SPI bus definition)
    ;
    ; USE_FSPI_PORT forces TFT_eSPI to set SPI_PORT=2 (a literal integer) instead of
    ; SPI_PORT=FSPI.  With arduino-esp32 v3.x / IDF v5, FSPI=0 but REG_SPI_BASE(0)
    ; returns 0, so SPI_USER_REG(0) = 0x10 → StoreProhibited crash.
    ; REG_SPI_BASE(2) = DR_REG_SPI2_BASE = 0x60024000 which is correct.
    -D USE_FSPI_PORT
    -D USER_SETUP_LOADED
    -D ST7789_DRIVER
    -D TFT_WIDTH=240
    -D TFT_HEIGHT=240
    -D TFT_MOSI=41
    -D TFT_SCLK=40
    -D TFT_CS=39
    -D TFT_DC=38
    -D TFT_RST=42
    -D TFT_MISO=-1
    -D TFT_BL=20
    -D SPI_FREQUENCY=40000000

lib_deps =
    bodmer/TFT_eSPI
    adafruit/Adafruit seesaw Library
    adafruit/Adafruit BusIO
    WiFiProvisioner.git=https://github.com/halfsohappy/WiFiProvisioner.git#56688e85fb1ac4b7695265e6b4a784cf60f26dba
