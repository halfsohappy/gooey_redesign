<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ title }} — Gooey</title>
  <link rel="icon" type="image/svg+xml" href="{{ url_for('static', filename='favicon.svg') }}">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
  <script>
    (function(){
      var t = localStorage.getItem('gooey-theme');
      if (t === 'dark' || (!t && matchMedia('(prefers-color-scheme:dark)').matches))
        document.documentElement.classList.add('dark');
    })();
  </script>
</head>
<body class="docs-page">

  <!-- ===== Docs Header ===== -->
  <header class="docs-header">
    <a class="hdr-logo-box" href="/">
      <span class="hdr-logo-text">Gooey</span>
      <span class="hdr-logo-sub">annieData · Control Center</span>
    </a>
    <nav class="hdr-nav">
      <a href="/">← App</a>
      {% for slug, label in other_guides.items() %}
      <a href="{{ url_for('docs', guide=slug) }}">{{ label }}</a>
      {% endfor %}
    </nav>
    <div class="hdr-title">{{ title }}</div>
  </header>

  <!-- ===== Docs Layout ===== -->
  <div class="docs-layout">

    <!-- Sidebar TOC -->
    <nav class="docs-toc" id="docsToc">
      <div class="docs-toc-heading">Contents</div>
      {{ toc | safe }}
    </nav>

    <!-- Main content -->
    <main class="docs-content" id="docsContent">
      <article class="docs-article">
        {{ content | safe }}
      </article>
    </main>

  </div>

  <footer class="docs-footer">
    Gooey &mdash; <a href="/">Back to App</a>
  </footer>

  <script>
  (function () {
    "use strict";

    /* Highlight the active TOC link as the user scrolls */
    var headings = Array.from(document.querySelectorAll(".docs-article h1, .docs-article h2, .docs-article h3"));
    var tocLinks = Array.from(document.querySelectorAll(".docs-toc a"));

    if (!headings.length || !tocLinks.length) { return; }

    function setActive(id) {
      tocLinks.forEach(function (a) {
        a.classList.toggle("toc-active", a.getAttribute("href") === "#" + id);
      });
    }

    window.addEventListener("scroll", function () {
      var scrollY = window.scrollY;
      var active = headings[0];
      headings.forEach(function (h) {
        if (h.offsetTop - 100 <= scrollY) { active = h; }
      });
      if (active) { setActive(active.id); }
    }, { passive: true });

    /* Smooth-scroll TOC links */
    tocLinks.forEach(function (a) {
      a.addEventListener("click", function (e) {
        var target = document.querySelector(a.getAttribute("href"));
        if (target) {
          e.preventDefault();
          window.scrollTo({ top: target.offsetTop - 80, behavior: "smooth" });
        }
      });
    });

  })();
  </script>

</body>
</html>
