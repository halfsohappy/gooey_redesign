<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Header Mockup — Option A</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
<style>
@import url('https://fonts.googleapis.com/css2?family=Martian+Mono:wght@300;400;500&family=Playwrite+DE+Grund:wght@400;500&family=Playwrite+IE:wght@100..400&display=swap');

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --header-bg:   #DAC7FF;
  --header-text: #2A2F36;
  --border:      rgba(0,0,0,0.10);
  --accent:      #90849c;
  --accent-hov:  #7a6f8a;
  --text-med:    #6C7A89;
  --text-light:  #ABB7B7;
  --success:     #4CAF50;
  --font:        "Martian Mono", monospace;
  --font-hdr:    "Playwrite IE", cursive;
}

body {
  font-family: var(--font);
  background: #2a2535;
  padding: 0;
  display: flex;
  flex-direction: column;
}

/* ── The header shell — row: [content column] [tools column] ── */
.main-header {
  display: flex;
  flex-direction: row;
  align-items: stretch;
  background: var(--header-bg);
  box-shadow: 0 2px 8px rgba(0,0,0,0.18);
  width: 100%;
  overflow: hidden;
  border-radius: 0;
}

/* Left/center: stacks the main row + status strip */
.hdr-content {
  flex: 1 1 auto;
  display: flex;
  flex-direction: column;
  min-width: 0;
}

/* ── Main row ── */
.hdr-row {
  display: flex;
  align-items: stretch;
  min-height: 64px;
}

/* ── WS status (strip) ── */
.hdr-ws-status {
  display: flex;
  align-items: center;
  gap: 5px;
}
.ws-dot {
  width: 7px; height: 7px;
  border-radius: 50%;
  background: var(--success);
  box-shadow: 0 0 5px rgba(76,175,80,0.5);
  flex-shrink: 0;
}
.ws-label {
  font-family: var(--font);
  font-size: 10px;
  color: var(--text-med);
}

/* ── Stacked Blackout/Restore column — left of panel buttons ── */
.hdr-bo-col {
  flex: 0 0 80px;
  display: flex;
  flex-direction: column;
  align-self: stretch;
  border-left: 1px solid var(--border);
}
.bo-btn {
  flex: 1;
  border: none;
  cursor: pointer;
  font-family: var(--font);
  font-size: 11px;
  font-weight: 500;
  display: flex;
  align-items: center;
  justify-content: center;
  white-space: nowrap;
}
.bo-blackout {
  background: rgba(15,15,15,0.82);
  color: #fff;
  border-bottom: 1px solid rgba(255,255,255,0.08);
}
.bo-blackout:hover { background: #000; }
.bo-restore {
  background: rgba(255,255,255,0.3);
  color: var(--header-text);
}
.bo-restore:hover { background: rgba(255,255,255,0.48); }

/* ── Device tabs zone ── */
.hdr-devices {
  flex: 1 1 auto;
  display: flex;
  flex-direction: row;
  align-items: stretch;
  padding: 0 14px 0 8px;
  border-right: 1px solid var(--border);
  overflow: hidden;
  gap: 6px;
}
/* Inner wrapper: exactly 2 rows, scrolls horizontally when tabs overflow */
.dev-tabs-wrap {
  flex: 1 1 auto;
  min-width: 0;
  display: grid;
  grid-template-rows: 1fr 1fr;
  grid-auto-flow: column;
  grid-auto-columns: auto;
  gap: 4px 5px;
  padding: 6px 0;
  overflow-x: auto;
  overflow-y: hidden;
}
.dev-tab {
  font-family: var(--font);
  font-size: 12px;
  font-weight: 400;
  padding: 0 13px;
  border: 1px solid rgba(0,0,0,0.16);
  background: rgba(255,255,255,0.45);
  color: var(--header-text);
  border-radius: 5px;
  cursor: pointer;
  white-space: nowrap;
  display: flex;
  align-items: center;
  justify-content: center;
}
.dev-tab.active {
  background: var(--accent);
  color: #fff;
  border-color: var(--accent);
}

.dev-actions-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  grid-template-rows: 1fr 1fr;
  gap: 4px;
  align-self: stretch;
  flex-shrink: 0;
  padding: 6px 0;
}
.dev-actions-grid .hdr-btn {
  padding: 0 12px;
  font-size: 20px;
  font-weight: 700;
  text-align: center;
  display: flex;
  align-items: center;
  justify-content: center;
}
.dev-actions-grid .hdr-btn-add { font-size: 22px; }
.dev-actions-grid .hdr-btn-gear { font-size: 20px; }

/* ── Query zone ── */
.hdr-query {
  flex: 0 0 auto;
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 0 14px;
  border-right: 1px solid var(--border);
}
.hdr-query-stack {
  display: flex;
  flex-direction: column;
  gap: 4px;
}

/* ── Port box in main header (stacked) ── */
.hdr-port-box {
  flex: 0 0 auto;
  display: flex;
  flex-direction: column;
  justify-content: center;
  gap: 4px;
  padding: 8px 18px;
  border-right: 1px solid var(--border);
}
.hdr-port-status {
  display: flex; align-items: center; gap: 6px;
  font-size: 13px; color: var(--text-med); white-space: nowrap;
}
.listen-dot {
  width: 6px; height: 6px;
  border-radius: 50%;
  background: var(--accent);
}
.hdr-port-change {
  display: flex; align-items: center; gap: 6px;
}
.hdr-port-change .hdr-input { font-size: 13px; padding: 5px 8px; }
.hdr-port-change .hdr-btn   { font-size: 13px; padding: 5px 12px; }

/* ── Blackout / Restore — side-by-side in the status strip ── */
.strip-blackout-pair {
  display: flex;
  flex-direction: row;
  align-self: stretch;
  flex-shrink: 0;
  overflow: hidden;
  border-right: 1px solid var(--border);
}
.strip-split-btn {
  border: none;
  cursor: pointer;
  font-family: var(--font);
  font-size: 11px;
  font-weight: 500;
  padding: 0 14px;
  display: flex;
  align-items: center;
  justify-content: center;
  white-space: nowrap;
}
.strip-blackout {
  background: rgba(15,15,15,0.82);
  color: #fff;
  border-right: 1px solid rgba(255,255,255,0.08);
}
.strip-blackout:hover { background: #000; }
.strip-restore {
  background: rgba(255,255,255,0.28);
  color: var(--header-text);
}
.strip-restore:hover { background: rgba(255,255,255,0.45); }

/* ── Panel toggle buttons — full-height 2×2 column ── */
.hdr-tools {
  flex: 0 0 auto;
  display: grid;
  grid-template-columns: 1fr 1fr;
  grid-template-rows: 1fr 1fr;
  gap: 6px;
  padding: 8px 10px;
  border-left: 1px solid var(--border);
  background: rgba(0,0,0,0.04);
  width: 180px;
}
.panel-btn {
  font-family: var(--font);
  font-size: 11px;
  font-weight: 500;
  border: 1px solid rgba(0,0,0,0.18);
  background: rgba(255,255,255,0.5);
  color: var(--header-text);
  border-radius: 5px;
  cursor: pointer;
  white-space: nowrap;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 5px;
}
.panel-btn i { font-size: 20px; line-height: 1; }
.panel-btn.active {
  background: var(--accent);
  color: #fff;
  border-color: var(--accent);
}

/* ── Shared button ── */
.hdr-btn {
  font-family: var(--font);
  font-size: 12px;
  font-weight: 400;
  padding: 5px 10px;
  border: 1px solid rgba(0,0,0,0.18);
  background: rgba(255,255,255,0.55);
  color: var(--header-text);
  border-radius: 5px;
  cursor: pointer;
  white-space: nowrap;
}
.hdr-btn-query {
  background: #6C7A89;
  color: #fff;
  border-color: #6C7A89;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 5px;
}
.hdr-btn-query .query-icon { font-size: 17px; line-height: 1; }
.hdr-btn-add { font-size: 18px; font-weight: 300; padding: 2px 10px; }
.hdr-input {
  font-family: var(--font); font-size: 12px;
  padding: 5px 7px;
  border: 1px solid rgba(0,0,0,0.18);
  background: rgba(255,255,255,0.6);
  color: var(--header-text);
  border-radius: 5px;
}
.hdr-select {
  font-family: var(--font); font-size: 12px;
  padding: 5px 6px;
  border: 1px solid rgba(0,0,0,0.18);
  background: rgba(255,255,255,0.6);
  color: var(--header-text);
  border-radius: 5px;
}
.hdr-unit { font-size: 11px; color: var(--text-light); }

/* ── Status strip ── */
.hdr-strip {
  display: flex;
  align-items: stretch;
  background: rgba(0,0,0,0.06);
  border-top: 1px solid var(--border);
  min-height: 28px;
  font-family: var(--font);
}
.strip-cell {
  display: flex;
  align-items: center;
  gap: 6px;
  padding: 4px 16px;
  border-right: 1px solid var(--border);
  font-size: 10px;
  color: var(--text-med);
  white-space: nowrap;
  flex-shrink: 0;
}
.strip-notif {
  flex: 1;
  display: flex;
  align-items: center;
  gap: 6px;
  padding: 0 14px;
  font-size: 10px;
  color: var(--text-light);
  font-style: italic;
  overflow: hidden;
  min-width: 0;
}
.strip-notif-label {
  font-style: normal;
  font-weight: 500;
  font-size: 9px;
  text-transform: uppercase;
  letter-spacing: .06em;
  color: var(--text-med);
  flex-shrink: 0;
}
</style>
</head>
<body>

<div class="main-header">

  <div class="hdr-content">

    <!-- ── Main action row ── -->
    <div class="hdr-row">

      <!-- Device actions + tabs -->
      <div class="hdr-devices">
        <div class="dev-actions-grid">
          <button class="hdr-btn hdr-btn-add"><i class="bi bi-plus-lg"></i></button>
          <button class="hdr-btn"><i class="bi bi-floppy"></i></button>
          <button class="hdr-btn hdr-btn-gear"><i class="bi bi-wrench"></i></button>
          <button class="hdr-btn"><i class="bi bi-folder2-open"></i></button>
        </div>
        <div class="dev-tabs-wrap">
          <button class="dev-tab active">bartholo</button>
          <button class="dev-tab">lilliana</button>
          <button class="dev-tab">samantha</button>
          <button class="dev-tab">marcello</button>
          <button class="dev-tab">katerina</button>
          <button class="dev-tab">dominick</button>
          <button class="dev-tab">florence</button>
          <button class="dev-tab">reginald</button>
        </div>
      </div>

      <!-- Query — stacked -->
      <div class="hdr-query">
        <div class="hdr-query-stack">
          <button class="hdr-btn hdr-btn-query"><i class="bi bi-arrow-repeat query-icon"></i> Query</button>
          <select class="hdr-select"><option>all devices</option></select>
        </div>
      </div>

      <!-- Port listening — stacked box -->
      <div class="hdr-port-box">
        <div class="hdr-port-status">
          <span class="listen-dot"></span>
          <span>Listening: <strong>9000</strong></span>
        </div>
        <div class="hdr-port-change">
          <input class="hdr-input" type="number" value="9000" style="width:72px">
          <button class="hdr-btn">Apply</button>
        </div>
      </div>

    </div><!-- /hdr-row -->

    <!-- ── Status strip ── -->
    <div class="hdr-strip">

      <div class="strip-cell">
        <span class="ws-dot"></span>
        <span>Connected</span>
      </div>

      <div class="strip-notif">
        <span class="strip-notif-label">Notif</span>
        No notifications yet
      </div>

      <div class="strip-notif" style="border-left:1px solid rgba(0,0,0,0.10)">
        <span class="strip-notif-label">Feed</span>
        No feed messages yet
      </div>

    </div>

  </div><!-- /hdr-content -->

  <!-- ── Blackout / Restore — full-height, left of panel buttons ── -->
  <div class="hdr-bo-col">
    <button class="bo-btn bo-blackout">Blackout</button>
    <button class="bo-btn bo-restore">Restore</button>
  </div>

  <!-- ── Panel toggles — full-height 2×2 ── -->
  <div class="hdr-tools">
    <button class="panel-btn active"><i class="bi bi-book"></i> Ref</button>
    <button class="panel-btn"><i class="bi bi-terminal"></i> Serial</button>
    <button class="panel-btn"><i class="bi bi-bell"></i> Notifs</button>
    <button class="panel-btn"><i class="bi bi-broadcast"></i> Feed</button>
  </div>

</div>

</body>
</html>
