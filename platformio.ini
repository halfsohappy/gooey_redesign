; PlatformIO Project Configuration — TheaterGWD (unified)
;
; This project supports two boards:
;   - Bart (default)  — BMP5xx barometer, ISM330DHCX IMU, MMC5983MA magnetometer
;   - ab7             — BNO085 IMU (SPI), SK6812 LED, two buttons, ori tracker
;
; Build with:
;   pio run -e bart              # Bart board
;   pio run -e ab7               # ab7 board with BNO085 IMU (SPI)

[platformio]
default_envs = bart

; ── Shared settings ──────────────────────────────────────────────────────────

[env]
platform = espressif32
board = esp32-s3-devkitc-1
framework = arduino
monitor_speed = 115200
upload_protocol = esptool
build_flags =
	-D ARDUINO_USB_MODE=1
	-D ARDUINO_USB_CDC_ON_BOOT=1
lib_deps =
	FastLED
	MicroOSC=https://github.com/halfsohappy/MicroOsc
	WiFiProvisioner.git=https://github.com/halfsohappy/WiFiProvisioner.git#56688e85fb1ac4b7695265e6b4a784cf60f26dba

; ── Bart board ───────────────────────────────────────────────────────────────

[env:bart]
lib_deps =
	${env.lib_deps}
	adafruit/Adafruit BMP5xx Library@^1.0.2
	sparkfun/SparkFun 6DoF ISM330DHCX@^1.0.6
	SparkFun MMC5983MA Magnetometer Arduino Library
	martinbudden/SensorFusion@^0.2.14
	martinbudden/VectorQuaternionMatrix@^0.4.10
	martinbudden/Filters@^0.9.4

; ── ab7 board with BNO085 (SPI) ─────────────────────────────────────────────

[env:ab7]
build_flags =
	${env.build_flags}
	-DAB7_BUILD
lib_deps =
	${env.lib_deps}
	adafruit/Adafruit BNO08x@^1.2.5

