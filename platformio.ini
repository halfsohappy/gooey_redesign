; PlatformIO Project Configuration — TheaterGWD (unified)
;
; This project supports two boards:
;   - Bart (default)  — BMP5xx barometer, LSM6DSV16XTR IMU (SPI, via SlimeIMU)
;   - ab7             — BNO085 IMU (SPI, via SlimeIMU), SK6812 LED, two buttons, ori tracker
;
; Both boards use the SlimeIMU library (slime_swipe) for sensor fusion.
;
; Build with:
;   pio run -e bart              # Bart board
;   pio run -e ab7               # ab7 board with BNO085 IMU (SPI)

[platformio]
default_envs = ab7

; ── Shared settings ──────────────────────────────────────────────────────────

[env]
platform = espressif32
board = esp32-s3-devkitc-1
framework = arduino
monitor_speed = 115200
upload_protocol = esptool
build_flags =
	-D ARDUINO_USB_MODE=1
	-D ARDUINO_USB_CDC_ON_BOOT=1
lib_deps =
	FastLED
	MicroOSC=https://github.com/halfsohappy/MicroOsc
	WiFiProvisioner.git=https://github.com/halfsohappy/WiFiProvisioner.git#56688e85fb1ac4b7695265e6b4a784cf60f26dba

; ── Bart board ───────────────────────────────────────────────────────────────

[env:bart]
build_flags =
	${env.build_flags}
	-DPIN_IMU_CS=42
	-DPIN_SPI_SCK=36
	-DPIN_SPI_MOSI=35
	-DPIN_SPI_MISO=37
build_src_filter =
	+<*>
	-<ab7_hardware.cpp>
lib_deps =
	${env.lib_deps}
	adafruit/Adafruit BMP5xx Library@^1.0.2
	https://github.com/halfsohappy/slime_swipe.git

; ── ab7 board with BNO085 (SPI) ─────────────────────────────────────────────

[env:ab7]
build_flags =
	${env.build_flags}
	-DAB7_BUILD
	-DPIN_IMU_CS=10
	-DPIN_SPI_SCK=12
	-DPIN_SPI_MISO=13
	-DPIN_SPI_MOSI=11
	-DPIN_IMU_INT=4
	-DPIN_BNO_RST=5
	-DPIN_BNO_WAK=6
build_src_filter =
	+<*>
	-<bart_hardware.cpp>
lib_deps =
	${env.lib_deps}
	https://github.com/halfsohappy/slime_swipe.git

