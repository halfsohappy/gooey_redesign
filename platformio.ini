; PlatformIO Project Configuration — TheaterGWD (unified)
;
; This project supports two boards:
;   - Bart            — ISM330DHCX IMU + MMC5983MA magnetometer + BMP5xx barometer (SPI, via SlimeIMU)
;   - ab7             — BNO085 IMU (SPI, via SlimeIMU), SK6812 LED, two buttons
;
; Both boards use the SlimeIMU library (slime_swipe) for sensor fusion and full ori support.
;
; Build with:
;   pio run -e bart              # Bart board
;   pio run -e ab7               # ab7 board with BNO085 IMU (SPI)

[platformio]
default_envs = ab7

; ── Shared settings ──────────────────────────────────────────────────────────

[env]
platform = espressif32
board = esp32-s3-devkitc-1
framework = arduino
monitor_speed = 115200
upload_protocol = esptool
build_cache_dir = .pio/build/.cache
build_flags =
	-D ARDUINO_USB_MODE=1
	-D ARDUINO_USB_CDC_ON_BOOT=1
lib_deps =
	FastLED
	MicroOSC=https://github.com/halfsohappy/MicroOsc
	WiFiProvisioner.git=https://github.com/halfsohappy/WiFiProvisioner.git#adc256bde28e1c171e5a5858f4a4bb32fa677b1e

; ── Bart board (ISM330DHCX + MMC5983MA + BMP5xx) ────────────────────────────

[env:bart]
build_flags =
	${env.build_flags}
	-DPIN_IMU_CS=42
	-DPIN_SPI_SCK=36
	-DPIN_SPI_MOSI=35
	-DPIN_SPI_MISO=37
build_src_filter =
	+<*>
	-<ab7_hardware.cpp>
lib_deps =
	${env.lib_deps}
	adafruit/Adafruit BMP5xx Library@^1.0.2
	https://github.com/halfsohappy/slime_swipe.git

; ── ab7 board with BNO085 (SPI) ─────────────────────────────────────────────

[ab7_common]
build_flags =
	${env.build_flags}
	-DAB7_BUILD
	-DPIN_IMU_CS=10
	-DPIN_SPI_SCK=12
	-DPIN_SPI_MISO=13
	-DPIN_SPI_MOSI=11
	-DPIN_IMU_INT=4
	-DPIN_BNO_RST=5
	-DPIN_BNO_WAK=6
lib_deps =
	${env.lib_deps}
	https://github.com/halfsohappy/slime_swipe.git

[env:ab7]
build_flags = ${ab7_common.build_flags}
build_src_filter =
	+<*>
	-<bart_hardware.cpp>
lib_deps = ${ab7_common.lib_deps}

; ── ab7 on-device tests ────────────────────────────────────────────────────
; Run with:  pio test -e ab7_test --upload-port /dev/cu.usbmodem*

[env:ab7_test]
build_flags = ${ab7_common.build_flags}
build_src_filter =
	+<*>
	-<bart_hardware.cpp>
lib_deps = ${ab7_common.lib_deps}
test_framework = unity
test_filter = test_ab7
test_build_src = yes

