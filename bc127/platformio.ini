; =============================================================================
; bc127 — DMX Controller for M5Stack CoreS3 + DMX Base
; =============================================================================
;
; Receives OSC messages over WiFi and outputs a single DMX universe.
; Supports direct channel addressing, fixture-level control with named
; colors (XKCD), RGB hex, group addressing, and blackout/restore.
;
; Build:   pio run
; Flash:   pio run -t upload
; Monitor: pio device monitor
; =============================================================================

[env:bc127]
platform = espressif32
board = m5stack-cores3
framework = arduino
monitor_speed = 115200
upload_protocol = esptool

build_flags =
    -D ARDUINO_USB_MODE=1
    -D ARDUINO_USB_CDC_ON_BOOT=1

lib_deps =
    m5stack/M5Unified
    someweisguy/esp_dmx@^4.1.0
    MicroOSC=https://github.com/halfsohappy/MicroOsc
    WiFiProvisioner.git=https://github.com/halfsohappy/WiFiProvisioner.git#56688e85fb1ac4b7695265e6b4a784cf60f26dba
