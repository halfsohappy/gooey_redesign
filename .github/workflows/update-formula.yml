name: Update Homebrew Formula

on:
  push:
    branches: [main]
    paths-ignore:
      # Don't re-trigger when this workflow commits the updated formula
      - "Formula/**"

permissions:
  contents: write

jobs:
  update-formula:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0   # need full history for commit count

      - name: Compute version
        id: ver
        run: |
          # YYYY.M.D.N — date-stamped with commit count for same-day disambiguation
          DATE=$(date -u +"%Y.%-m.%-d")
          COUNT=$(git rev-list --count HEAD)
          echo "version=${DATE}.${COUNT}" >> "$GITHUB_OUTPUT"

      - name: Update Formula/gooey.rb version
        run: |
          VERSION="${{ steps.ver.outputs.version }}"
          sed -i "s/version \".*\"/version \"${VERSION}\"/" Formula/gooey.rb
          echo "Bumped formula to ${VERSION}"

      - name: Commit and push
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/gooey.rb
          git diff --staged --quiet && echo "No change" && exit 0
          git commit -m "chore: bump formula to ${{ steps.ver.outputs.version }}"
          git push
