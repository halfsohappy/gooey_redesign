name: Update Homebrew Formula

on:
  push:
    branches: [main]
    paths-ignore:
      # Don't re-trigger when this workflow commits the updated files
      - "Formula/**"
      - "gooey/pyproject.toml"
      - "aur/**"

permissions:
  contents: write
  id-token: write   # required for PyPI OIDC trusted publishing

jobs:
  update-formula:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0   # need full history for commit count

      - name: Compute version
        id: ver
        run: |
          # YYYY.M.D.N — date-stamped with commit count for same-day disambiguation
          DATE=$(date -u +"%Y.%-m.%-d")
          COUNT=$(git rev-list --count HEAD)
          echo "version=${DATE}.${COUNT}" >> "$GITHUB_OUTPUT"

      - name: Update version in all package files
        run: |
          VERSION="${{ steps.ver.outputs.version }}"
          sed -i "s/version \".*\"/version \"${VERSION}\"/" Formula/gooey.rb
          sed -i "s/^version = \".*\"/version = \"${VERSION}\"/" gooey/pyproject.toml
          sed -i "s/^pkgver=.*/pkgver=${VERSION}/" aur/PKGBUILD
          echo "Bumped all package files to ${VERSION}"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build Python package
        run: |
          pip install build
          cd gooey && python -m build

      - name: Compute sdist sha256 for AUR
        id: sha
        run: |
          VERSION="${{ steps.ver.outputs.version }}"
          SHA256=$(sha256sum gooey/dist/gooey_theatergwd-${VERSION}.tar.gz | awk '{print $1}')
          echo "sha256=${SHA256}" >> "$GITHUB_OUTPUT"
          sed -i "s/sha256sums=('.*')/sha256sums=('${SHA256}')/" aur/PKGBUILD
          echo "PKGBUILD sha256: ${SHA256}"

      - name: Commit and push
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/gooey.rb gooey/pyproject.toml aur/PKGBUILD
          git diff --staged --quiet && echo "No change" && exit 0
          git commit -m "chore: bump to ${{ steps.ver.outputs.version }}"
          git push

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: gooey/dist/

      - name: Sync formula to homebrew-theatergwd tap
        env:
          TAP_REPO_TOKEN: ${{ secrets.TAP_REPO_TOKEN }}
        if: env.TAP_REPO_TOKEN != ''
        run: |
          git clone https://x-access-token:${TAP_REPO_TOKEN}@github.com/halfsohappy/homebrew-theatergwd.git /tmp/tap
          cp Formula/gooey.rb /tmp/tap/Formula/gooey.rb
          cd /tmp/tap
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/gooey.rb
          git diff --staged --quiet && echo "Tap already up to date" && exit 0
          git commit -m "chore: bump gooey to ${{ steps.ver.outputs.version }}"
          git push

      - name: Publish to AUR
        uses: KSXGitHub/github-actions-deploy-aur@v3.0.1
        if: ${{ secrets.AUR_SSH_KEY != '' }}
        with:
          pkgname: gooey-theatergwd
          pkgbuild: ./aur/PKGBUILD
          commit_username: github-actions[bot]
          commit_email: github-actions[bot]@users.noreply.github.com
          ssh_private_key: ${{ secrets.AUR_SSH_KEY }}
          commit_message: "chore: bump to ${{ steps.ver.outputs.version }}"
          ssh_keyscan_types: rsa,ecdsa,ed25519
