name: Build annieData

on:
  push:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  # ── Desktop builds (macOS, Windows, Linux) ────────────────────────────────
  build-desktop:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            label: macOS
          - os: windows-latest
            label: Windows
          - os: ubuntu-latest
            label: Linux

    runs-on: ${{ matrix.os }}
    environment: main - gooey-theatergwd

    steps:
      - uses: actions/checkout@v4

      - name: Install Linux system dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt update
          sudo apt install -y \
            libwebkit2gtk-4.1-dev build-essential curl wget file \
            libxdo-dev libssl-dev libayatana-appindicator3-dev librsvg2-dev

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Python dependencies
        working-directory: gooey
        run: pip install -r requirements.txt pyinstaller

      - name: Install npm dependencies
        working-directory: gooey
        run: npm install

      - name: Build sidecar (macOS / Linux)
        if: runner.os != 'Windows'
        working-directory: gooey
        run: bash scripts/build_sidecar.sh

      - name: Build sidecar (Windows)
        if: runner.os == 'Windows'
        working-directory: gooey
        shell: pwsh
        run: |
          $triple = (rustc -vV | Select-String 'host:').ToString().Split(':')[1].Trim()
          python -m PyInstaller GooeyServer.spec
          New-Item -ItemType Directory -Force -Path src-tauri/binaries | Out-Null
          Copy-Item "dist/gooey-server.exe" "src-tauri/binaries/gooey-server-$triple.exe"

      - name: Import Apple certificate (macOS)
        if: runner.os == 'macOS'
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ github.run_id }}
        run: |
          if [ -z "$APPLE_CERTIFICATE" ]; then echo "No cert secret — skipping signing"; exit 0; fi
          echo "$APPLE_CERTIFICATE" | base64 --decode > certificate.p12
          security create-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
          security import certificate.p12 -k build.keychain \
            -P "$APPLE_CERTIFICATE_PASSWORD" -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple: -s \
            -k "$KEYCHAIN_PASSWORD" build.keychain
          rm -f certificate.p12

      - name: Build Tauri app
        working-directory: gooey
        env:
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          if [ "$RUNNER_OS" = "macOS" ] && [ -z "$APPLE_SIGNING_IDENTITY" ]; then
            echo "::warning::APPLE_SIGNING_IDENTITY is not set — app will be unsigned and rejected by Gatekeeper"
          fi
          npx tauri build

      - name: Upload macOS artifacts
        if: runner.os == 'macOS'
        uses: actions/upload-artifact@v4
        with:
          name: annieData-macOS
          path: gooey/src-tauri/target/release/bundle/dmg/*.dmg

      - name: Upload Windows artifacts
        if: runner.os == 'Windows'
        uses: actions/upload-artifact@v4
        with:
          name: annieData-Windows
          path: |
            gooey/src-tauri/target/release/bundle/nsis/*.exe
            gooey/src-tauri/target/release/bundle/msi/*.msi

      - name: Upload Linux artifacts
        if: runner.os == 'Linux'
        uses: actions/upload-artifact@v4
        with:
          name: annieData-Linux
          path: |
            gooey/src-tauri/target/release/bundle/appimage/*.AppImage
            gooey/src-tauri/target/release/bundle/deb/*.deb

  # ── Publish: update the rolling `build` release with latest artifacts ───────
  # The `build` tag/release is always replaced with the latest successful build.
  # No history accumulates. To get an old build, revert the source and rebuild.
  publish:
    needs: build-desktop
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: _artifacts

      - name: Collect and rename release files
        run: |
          VERSION=$(python3 -c "import json; print(json.load(open('gooey/src-tauri/tauri.conf.json'))['version'])")
          mkdir -p release_files

          DMG=$(find _artifacts/annieData-macOS   -name "*.dmg"      | head -1)
          EXE=$(find _artifacts/annieData-Windows -name "*.exe"      | head -1)
          IMG=$(find _artifacts/annieData-Linux   -name "*.AppImage" | head -1)
          DEB=$(find _artifacts/annieData-Linux   -name "*.deb"      | head -1)

          [ -n "$DMG" ] && cp "$DMG" "release_files/annieData_${VERSION}_macOS.dmg"
          [ -n "$EXE" ] && cp "$EXE" "release_files/annieData_${VERSION}_Windows.exe"
          [ -n "$IMG" ] && cp "$IMG" "release_files/annieData_${VERSION}_ubuntu.AppImage"
          [ -n "$DEB" ] && cp "$DEB" "release_files/annieData_${VERSION}_debian.deb"

          ls -lh release_files/

      - name: Delete existing release and tag (if present)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION=$(cat gooey/src-tauri/tauri.conf.json | python3 -c "import sys,json; print(json.load(sys.stdin)['version'])")
          echo "VERSION=v${VERSION}" >> $GITHUB_ENV
          gh release delete "v${VERSION}" --yes --repo ${{ github.repository }} 2>/dev/null || true
          git push origin ":refs/tags/v${VERSION}" 2>/dev/null || true

      - name: Create updated release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "$VERSION" release_files/* \
            --repo ${{ github.repository }} \
            --title "$VERSION" \
            --notes "Built from \`${{ github.sha }}\` on $(date -u +'%Y-%m-%d %H:%M UTC')" \
            --latest
